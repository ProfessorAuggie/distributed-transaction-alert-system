version: '3.8'
services:
  app:
    build: .
    image: distributed-transaction-alert-system:latest
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
      - redis
    environment:
      SPRING_DATA_MONGODB_URI: "mongodb://mongodb:27017/alertsystem"
      SPRING_REDIS_HOST: "redis"
      SPRING_REDIS_PORT: "6379"
    restart: unless-stopped

  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: alertsystem
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mongo-data:
